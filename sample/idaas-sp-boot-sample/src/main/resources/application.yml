server:
  port: 8081
spring:
  application:
    name: sample
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/kewen_framework_auth_template
    username: your_username
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      auto-commit:true
      connection-test-query:select 1
      connection-timeout:30000
      idle-timeout:600000
      max-lifetime:1800000
      maximum-pool-size:5
      minimum-idle:2
      validation-timeout:5000
      pool-name:HikaraPool-1
  session:
    store-type: none
    timeout: 2D #超时2天

logging:
  level:
    org.springframework.security: TRACE
    org.springframework.security.oauth2.jwt: TRACE
    com.nimbusds: TRACE
  file:
    name: auth-sample
    path: ./logs

kewen:
  auth:
    auth-data-table:
      table-name: sys_auth_data
      id-column: id
      data-id-column: data_id
      authority-column: authority
      description-column: description
      business-function-column: business_function
      operate-column: operate
    cache-auth: false  # 是否缓存菜单权限
  security:
    remember-me:
      enabled: true
      remember-parameter: remember-me
      validity-seconds: 2592000
    session:
      maximum-sessions: 10               #最大session数量
      max-sessions-prevents-login: true # 是否不允许挤下线
    current-user-url: /currentUser    #当前用户接口地址
    login:
      password:
        login-url: /login                 #登录地址
        username-parameter: username      # username参数
        password-parameter: password      # password参数
      saml:
        sp-signing-keystore:
          keystore-resource: classpath:saml/sp-keystore.jks
          keystore-password: changeit
          key-alias: sp-signing
          key-password: changeit
        registrations:
          -
            registration-id: kewen-local-registration
            sp-entity-id: kewen-loc
            metadata-resource: classpath:saml/metadata/kewen-local-metadata.xml
          -
            registration-id: idp4-test-kewen-loc-registration          # relying party registration id
            sp-entity-id: idp4-test-kewen-loc     # your app entity id
            #use-metadata: true
            #web-sso-url: "https://idp4-test.alibaba.net/sso/saml" # your idp sso url
            #idp-certificate-resource: classpath:saml/idp-certificate.crt # your idp certificate resource
            metadata-resource: classpath:saml/metadata/idaas-idp4-test-metadata.xml
          -
            registration-id: idp4-dev-kewen-loc-registration
            sp-entity-id: idp4-dev-kewen-loc
            metadata-resource: classpath:saml/metadata/idaas-idp4-dev-metadata.xml
          -
            registration-id: idp4-loc-kewen-loc-registration
            sp-entity-id: idp4-loc-kewen-loc
            metadata-resource: classpath:saml/metadata/idaas-idp4-loc-metadata.xml

      oauth2:
        sso-authorization-uri: /oauth2/authorize
        clients:
          -
            registration-id: kewen-local-oidc-registration
            protocol-type: oidc
            client-id: your_client_id
            client-secret: your_client_secret
            issuer-uri: http://localhost:9010/oidc
            jwk-set-uri: http://localhost:9010/oidc/jwks?client_id=your_client_id
          -
            registration-id: kewen-local-oauth-registration
            protocol-type: oauth2
            client-id: your_client_id
            client-secret: your_client_secret
            authorization-uri: http://localhost:9010/oauth2/authorize
            token-uri: http://localhost:9010/oauth2/token
            user-info-uri: http://localhost:9010/oauth2/userinfo
            user-name-attribute-name: sub
            client-authentication-method: basic
            authorization-grant-type: authorization_code
            scopes:
              -  read
            redirect-uri-template: "{baseUrl}/login/oauth2/code/{registrationId}"
            ignore-ssl: true
          -
            registration-id: idp4-test-kewen-loc-registration
            client-id: your_idp4_client_id
            client-secret: your_idp4_client_secret
            authorization-uri: http://idp4-test.example.net/oauth/authorize
            token-uri: http://idp4-test.example.net/oauth/token
            user-info-uri: http://idp4-test.example.net/api/bff/v1.2/oauth/userinfo
            user-name-attribute-name: sub
            client-authentication-method: basic
            authorization-grant-type: authorization_code
            scopes:
              -  read
            redirect-uri-template: "{baseUrl}/login/oauth2/code/{registrationId}"
            ignore-ssl: true